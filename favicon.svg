  <!-- Inner circle -->
  <circle cx="16" cy="16" r="7.5" stroke="#C4A882" stroke-width="1" fill="none"/>
  <!-- Crosshair lines -->
  <line x1="2" y1="16" x2="30" y2="16" stroke="#C4A882" stroke-width=".7" opacity=".6"/>
  <line x1="16" y1="2" x2="16" y2="30" stroke="#C4A882" stroke-width=".7" opacity=".6"/>
  <!-- Endpoint dots -->
  <circle cx="16" cy="2.5" r="1.1" fill="#C4A882"/>
  <circle cx="16" cy="29.5" r="1.1" fill="#C4A882"/>
  <circle cx="2.5" cy="16" r="1.1" fill="#C4A882"/>
  <circle cx="29.5" cy="16" r="1.1" fill="#C4A882"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2.2" fill="#B8916A"/>
</svg>
